// ── DB ────────────────────────────────────────────────────────────────────────
function dbLoad(key, cb) {
  sb.from("kv_store").select("value").eq("key", key).single().then(function(res) {
    if (res.error || !res.data) { cb(null); return; }
    var v = res.data.value;
    cb(Array.isArray(v) ? v : (typeof v==="string" ? JSON.parse(v) : v));
  }).catch(function(){ cb(null); });
}

function dbSave(key, data, cb) {
  console.log("dbSave", key, Array.isArray(data)?data.length:"obj");
  sb.from("kv_store").upsert({key:key, value:data},{onConflict:"key"}).then(function(res){
    if (res.error) console.error("Save error:", res.error); else console.log("Save OK");
    if (cb) cb();
  }).catch(function(e){console.error("Save exception:",e); if(cb) cb();});
}

function dbListArchives(cb) {
  sb.from("kv_store").select("key").like("key","makerslab-archive-%").then(function(res){
    cb(res.error||!res.data ? [] : res.data.map(function(r){return r.key;}).sort().reverse());
  }).catch(function(){cb([]);});
}

// ── STATUS BADGE ──────────────────────────────────────────────────────────────
function StatusBadge(props) {
  var r=props.r;
  if (r.received)                   return <span className="badge b-recv">Received</span>;
  if (r.jessicaOrdered)             return <span className="badge b-ordr">Ordered</span>;
  if (r.jdApproval==="Approved")    return <span className="badge b-ordr">Awaiting Order</span>;
  if (r.jdApproval==="Denied")      return <span className="badge b-deny">JD Denied</span>;
  if (r.submittedForOrder)          return <span className="badge b-ordr">With JD</span>;
  if (r.teacherStatus==="Approved") return <span className="badge b-appr">Approved</span>;
  if (r.teacherStatus==="Denied")   return <span className="badge b-deny">Denied</span>;
  if (r.teacherStatus==="Revision") return <span className="badge b-revise">Needs Changes</span>;
  if (r.onHold)                     return <span className="badge b-hold">On Hold</span>;
  return <span className="badge b-pend">Pending</span>;
}

  var mine = useMemo(function(){return requests.filter(function(r){return r.studentName===user.name;});}, [requests,user.name]);
  var revisions = useMemo(function(){return mine.filter(function(r){return r.teacherStatus==="Revision";});}, [mine]);
  var _sf=useState(false); var showForm=_sf[0]; var setShowForm=_sf[1];
  var _ei=useState(null); var editingId=_ei[0]; var setEditingId=_ei[1];
  var BLANK = {itemDescription:"",vendor:"",vendorOther:"",link:"",quantity:"",pricePerUnit:"",consumableOrDurable:"Consumable",additionalDetails:"",phase:PHASES[0],priority:"Normal"};
  var _f=useState(BLANK); var form=_f[0]; var setForm=_f[1];

  function sf(k,v){setForm(function(p){var n={}; for(var x in p)n[x]=p[x]; n[k]=v; return n;});}

  function openNew(){setEditingId(null);setForm(BLANK);setShowForm(true);}
  function openRevise(r){
    setEditingId(r.id);
    setForm({itemDescription:r.itemDescription,priority:r.priority||"Normal",
      vendor:VENDORS.indexOf(r.vendor)>=0?r.vendor:"Other",
      vendorOther:VENDORS.indexOf(r.vendor)>=0?"":r.vendor,
      link:r.link||"",quantity:String(r.quantity||""),pricePerUnit:String(r.pricePerUnit||""),
      consumableOrDurable:r.consumableOrDurable,additionalDetails:r.additionalDetails||"",phase:r.phase});
    setShowForm(true);
  }

  // Duplicate detection
  var dupWarning = useMemo(function(){
    if (!form.itemDescription || form.itemDescription.length<4) return null;
    var desc = form.itemDescription.toLowerCase();
    var dup = requests.find(function(r){ return r.id!==editingId && r.studentName===user.name && (r.itemDescription||"").toLowerCase().indexOf(desc.slice(0,8))>=0; });
    return dup ? "Heads up — you may have already submitted something similar: \""+dup.itemDescription+"\"" : null;
  }, [form.itemDescription, requests, editingId, user.name]);

  function submit(e) {
    e.preventDefault();
    var vendorVal = form.vendor==="Other" ? form.vendorOther.trim() : form.vendor;
    if (editingId) {
      onSave(requests.map(function(r){
        if (r.id!==editingId) return r;
        return Object.assign({},r,{itemDescription:form.itemDescription.trim()||r.itemDescription,vendor:vendorVal||r.vendor,
          link:form.link.trim(),quantity:Number(form.quantity)||1,pricePerUnit:Number(form.pricePerUnit)||0,
          consumableOrDurable:form.consumableOrDurable,additionalDetails:form.additionalDetails.trim(),
          phase:form.phase,priority:form.priority,teacherStatus:"Pending",teacherNotes:"",revisedAt:today()});
      }));
    } else {
      var req={id:genId(),studentName:user.name,
        itemDescription:form.itemDescription.trim()||"(no description)",
        vendor:vendorVal||"Amazon",link:form.link.trim(),
        quantity:Number(form.quantity)||1,pricePerUnit:Number(form.pricePerUnit)||0,
        consumableOrDurable:form.consumableOrDurable,additionalDetails:form.additionalDetails.trim(),
        phase:form.phase,priority:form.priority||"Normal",
        onHold:false,teacherStatus:"Pending",teacherNotes:"",
        submittedForOrder:false,dateSubmitted:null,
        jdApproval:"Pending",jdNotes:"",
        jessicaOrdered:false,dateOrdered:null,received:false,dateReceived:null,createdAt:today()};
      onSave(requests.concat([req]));
      emailTeacherNewRequest(user.name, req.itemDescription);
    }
    setForm(BLANK);setShowForm(false);setEditingId(null);
  }

  var qty=Number(form.quantity),price=Number(form.pricePerUnit);
  var estTotal=(form.quantity!==""&&form.pricePerUnit!==""&&qty>0&&price>0)?(qty*price).toFixed(2):null;

  return (
    <Page>
      <div style={{background:"linear-gradient(135deg,#ff6b35 0%,#f04e1f 100%)",borderRadius:18,padding:"22px 26px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
        <div>
          <h2 style={{color:"#fff",fontSize:22,fontWeight:700,letterSpacing:"-.03em"}}>Hey, {user.name} 👋</h2>
          <p style={{color:"rgba(255,255,255,.75)",fontSize:13,marginTop:3}}>Submit your material requests below. Mr. Weymuth reviews everything.</p>
        </div>
        <button onClick={openNew} className="btn" style={{background:"#fff",color:"#f04e1f",fontWeight:600}}>+ New Request</button>
      </div>

      {revisions.length>0 && revisions.map(function(r){return (
        <div key={r.id} className="revise-banner">
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{fontWeight:600,fontSize:13,color:"#92400e",marginBottom:4}}>⚠ Revision requested — {r.itemDescription}</div>
              <div style={{fontSize:13,color:"#78350f"}}><strong>Mr. Weymuth says:</strong> {r.teacherNotes||"Please update this request."}</div>
            </div>
            <button onClick={function(){openRevise(r);}} className="btn btn-yellow btn-sm">Edit &amp; Resubmit →</button>
          </div>
        </div>
      );})}

      <div className="g3">
        {[{v:mine.length,l:"Requests",c:T.text1},{v:mine.filter(function(r){return r.teacherStatus==="Approved";}).length,l:"Approved",c:T.green},{v:mine.filter(function(r){return r.received;}).length,l:"Received",c:T.blue}].map(function(s){return (
          <div key={s.l} className="stat"><div className="stat-v" style={{color:s.c}}>{s.v}</div><div className="stat-l">{s.l}</div></div>
        );})}
      </div>

      <div className="card">
        <div className="card-hd"><h3>My Requests</h3><span style={{color:T.text3,fontSize:12}}>{mine.length} item{mine.length!==1?"s":""}</span></div>
        {mine.length===0 ? <div className="empty"><div className="empty-icon">📋</div><p>No requests yet. Hit the button above to start!</p></div> : (
          <div style={{overflowX:"auto"}}>
            <table className="tbl">
              <thead><tr><th></th><th>Item</th><th>Vendor</th><th>Qty</th><th>Unit $</th><th>Total</th><th>Phase</th><th>Status</th><th>Notes from Teacher</th><th></th></tr></thead>
              <tbody>{mine.map(function(r){return (
                <tr key={r.id}>
                  <td>{r.priority==="High"&&<span title="High Priority" style={{fontSize:13}}>🔴</span>}</td>
                  <td style={{fontWeight:500,maxWidth:200}}>{r.itemDescription}</td>
                  <td style={{fontSize:12,color:T.text2}}>{r.link?<a href={r.link} target="_blank" rel="noreferrer">{r.vendor} ↗</a>:r.vendor}</td>
                  <td style={{textAlign:"center"}}>{r.quantity}</td>
                  <td>{fmtMoney(r.pricePerUnit)}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td style={{fontSize:11,color:T.text2}}>{r.phase.split("—")[0].trim()}</td>
                  <td><StatusBadge r={r}/></td>
                  <td style={{maxWidth:180,fontSize:12,color:T.text2,fontStyle:r.teacherNotes?"normal":"italic"}}>{r.teacherNotes||"—"}</td>
                  <td>{r.teacherStatus==="Revision"&&<button className="btn btn-yellow btn-sm" onClick={function(){openRevise(r);}}>Edit →</button>}</td>
                </tr>
              );})}</tbody>
            </table>
          </div>
        )}
      </div>

      {showForm && (
        <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)setShowForm(false);}}>
          <div className="modal">
            <div className="modal-hd">
              <h2>{editingId?"Edit & Resubmit":"New Purchase Request"}</h2>
              <button className="close-btn" onClick={function(){setShowForm(false);}}>×</button>
            </div>
            <form onSubmit={submit}>
              <div className="modal-bd">
                <div className="field"><label>What do you need?</label>
                  <input className="inp" value={form.itemDescription} onChange={function(e){sf("itemDescription",e.target.value);}} placeholder="Be specific — brand, model, size, color…"/>
                  {dupWarning&&<div style={{fontSize:12,color:T.orange,marginTop:2}}>⚠ {dupWarning}</div>}
                </div>
                <div className="g2">
                  <div className="field"><label>Vendor</label>
                    <select className="inp" value={form.vendor} onChange={function(e){sf("vendor",e.target.value);}}>
                      <option value="">Select…</option>{VENDORS.map(function(v){return <option key={v}>{v}</option>;})}
                    </select>
                  </div>
                  {form.vendor==="Other"&&<div className="field"><label>Vendor name</label>
                    <input className="inp" value={form.vendorOther} onChange={function(e){sf("vendorOther",e.target.value);}} placeholder="e.g. Rockler"/>
                  </div>}
                </div>
                <div className="field"><label>Link to item</label>
                  <input className="inp" type="url" value={form.link} onChange={function(e){sf("link",e.target.value);}} placeholder="https://…"/>
                </div>
                <div className="g2">
                  <div className="field"><label>Quantity</label>
                    <input className="inp" type="number" min="1" step="1" value={form.quantity} onChange={function(e){sf("quantity",e.target.value);}} placeholder="How many?"/>
                  </div>
                  <div className="field"><label>Price per unit ($)</label>
                    <input className="inp" type="number" step="0.01" min="0" value={form.pricePerUnit} onChange={function(e){sf("pricePerUnit",e.target.value);}} placeholder="0.00"/>
                  </div>
                </div>
                {estTotal&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 14px",fontSize:13,color:T.blue,fontWeight:500}}>Estimated total: ${estTotal}</div>}
                <div className="g2">
                  <div className="field"><label>Type</label>
                    <select className="inp" value={form.consumableOrDurable} onChange={function(e){sf("consumableOrDurable",e.target.value);}}>
                      <option value="Consumable">Consumable — used up</option>
                      <option value="Durable">Durable — reused next year</option>
                    </select>
                  </div>
                  <div className="field"><label>Priority</label>
                    <select className="inp" value={form.priority} onChange={function(e){sf("priority",e.target.value);}}>
                      <option value="Normal">Normal</option>
                      <option value="High">🔴 High — I need this soon</option>
                    </select>
                  </div>
                </div>
                <div className="field"><label>Phase — when do you need it?</label>
                  <select className="inp" value={form.phase} onChange={function(e){sf("phase",e.target.value);}}>
                    {PHASES.map(function(p){return <option key={p}>{p}</option>;})}
                  </select>
                </div>
                <div className="field"><label>Additional details</label>
                  <textarea className="inp" rows={3} value={form.additionalDetails} onChange={function(e){sf("additionalDetails",e.target.value);}} placeholder="Color, size, why you need it, project name…" style={{resize:"vertical"}}/>
                </div>
              </div>
              <div className="modal-ft">
                <button type="button" onClick={function(){setShowForm(false);}} className="btn btn-ghost">Cancel</button>
                <button type="submit" className={"btn "+(editingId?"btn-yellow":"btn-blue")}>{editingId?"Resubmit →":"Submit Request →"}</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </Page>
  );
}

// ── TEACHER DASHBOARD ─────────────────────────────────────────────────────────
function TeacherDash(props) {
  var user=props.user, requests=props.requests, onSave=props.onSave, roster=props.roster, onSaveRoster=props.onSaveRoster;
  var _t=useState("pending"); var tab=_t[0]; var setTab=_t[1];
  var _s=useState(null); var sel=_s[0]; var setSel=_s[1];
  var _n=useState(""); var notes=_n[0]; var setNotes=_n[1];
  var _fs=useState(""); var filterS=_fs[0]; var setFilterS=_fs[1];
  var _fp=useState(""); var filterP=_fp[0]; var setFilterP=_fp[1];
  var _bn=useState(""); var batchNote=_bn[0]; var setBatchNote=_bn[1];
  var _sr=useState(false); var showRoster=_sr[0]; var setShowRoster=_sr[1];
  var _rc=useState(""); var rosterCsv=_rc[0]; var setRosterCsv=_rc[1];

  var pending   = useMemo(function(){return requests.filter(function(r){return r.teacherStatus==="Pending"&&!r.onHold;});}, [requests]);
  var onHold    = useMemo(function(){return requests.filter(function(r){return r.onHold;});}, [requests]);
  var readySend = useMemo(function(){return requests.filter(function(r){return r.teacherStatus==="Approved"&&!r.submittedForOrder;});}, [requests]);
  var submitted = useMemo(function(){return requests.filter(function(r){return r.submittedForOrder;});}, [requests]);
  var allF = useMemo(function(){
    var l=requests.slice().sort(function(a,b){return a.studentName.localeCompare(b.studentName);});
    if(filterS) l=l.filter(function(r){return r.studentName===filterS;});
    if(filterP) l=l.filter(function(r){return r.phase===filterP;});
    return l;
  }, [requests,filterS,filterP]);

  var batchTotal = readySend.reduce(function(s,r){return s+(getTotal(r)||0);}, 0);

  function getStudentEmail(name) {
    if (!roster||!roster.length) return null;
    var found = roster.find(function(s){return (s.name||s)===name;});
    return found&&found.email ? found.email : null;
  }

  function togglePriority(id) {
    onSave(requests.map(function(r){return r.id===id?Object.assign({},r,{priority:r.priority==="High"?"Normal":"High"}):r;}));
  }

  function setStatus(id,status) {
    var ts=new Date().toISOString();
    var updated=requests.map(function(r){return r.id===id?Object.assign({},r,{teacherStatus:status,teacherNotes:notes,teacherActionAt:ts,teacherActionBy:"Mr. Weymuth"}):r;});
    onSave(updated);
    var req=requests.find(function(r){return r.id===id;});
    if (req) emailStudentAction(getStudentEmail(req.studentName), req.studentName, req.itemDescription, status, notes);
    setSel(null); setNotes("");
  }

  function toggleHold(id) {
    onSave(requests.map(function(r){return r.id===id?Object.assign({},r,{onHold:!r.onHold}):r;}));
  }

  function submitBatch(ids) {
    console.log("submitBatch", ids.length);
    var updated=requests.map(function(r){return ids.indexOf(r.id)>=0?Object.assign({},r,{submittedForOrder:true,dateSubmitted:today()}):r;});
    onSave(updated);
    var batch=requests.filter(function(r){return ids.indexOf(r.id)>=0;});
    var bTotal=batch.reduce(function(s,r){return s+(getTotal(r)||0);},0);
    var lines=batch.map(function(r){return "- "+r.itemDescription+" ("+r.studentName+") — "+fmtMoney(getTotal(r));}).join("\n");
    emailJDBatch(ids.length, fmtMoney(bTotal), lines, batchNote.trim());
    setBatchNote("");
  }

  function exportCSV() {
    var cols=["Student","Item","Vendor","Link","Qty","Unit $","Total","Phase","Priority","Type","Status","Submitted","JD Status","Ordered","Received","Tracking"];
    var rows=requests.map(function(r){
      var st=r.received?"Received":r.jessicaOrdered?"Ordered":r.jdApproval==="Approved"?"Awaiting Order":r.submittedForOrder?"With JD":r.teacherStatus==="Approved"?"Teacher Approved":r.teacherStatus==="Denied"?"Denied":r.teacherStatus==="Revision"?"Needs Revision":r.onHold?"On Hold":"Pending";
      return [r.studentName,r.itemDescription,r.vendor,r.link||"",r.quantity,r.pricePerUnit,getTotal(r)||"",r.phase,r.priority||"Normal",r.consumableOrDurable,st,r.dateSubmitted||"",r.jdApproval||"",r.dateOrdered||"",r.dateReceived||"",r.trackingNumber||""];
    });
    var csv=[cols].concat(rows).map(function(row){return row.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
    var a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download="makerslab-"+today()+".csv";
    a.click();
  }

  function archiveYear() {
    var yr=prompt("Enter school year label (e.g. 2024-25):");
    if (!yr||!yr.trim()) return;
    if (!window.confirm("Archive all "+requests.length+" requests as '"+yr.trim()+"' and start fresh?")) return;
    dbSave("makerslab-archive-"+yr.trim(), requests, function(){
      onSave([]);
      alert("Archived successfully!");
    });
  }

  function saveRoster() {
    var lines=rosterCsv.trim().split("\n").filter(function(l){return l.trim();});
    var parsed=lines.map(function(l){
      var parts=l.split(",");
      return {name:(parts[0]||"").trim(), email:(parts[1]||"").trim()};
    }).filter(function(s){return s.name;});
    onSaveRoster(parsed);
    setShowRoster(false);
    alert("Roster saved — "+parsed.length+" students.");
  }

  function TRow(p) {
    var r=p.r;
    return (
      <tr style={{background:r.priority==="High"?"#fffbf5":""}}>
        <td style={{textAlign:"center",width:32}}>
          <button title={r.priority==="High"?"Remove priority":"Set high priority"}
            onClick={function(){togglePriority(r.id);}}
            style={{background:"none",border:"none",cursor:"pointer",fontSize:14,opacity:r.priority==="High"?1:0.2,padding:2,transition:"opacity .15s"}}>🔴</button>
        </td>
        <td style={{fontWeight:500}}>{r.studentName}</td>
        <td style={{maxWidth:180}}>
          <div style={{fontWeight:500,fontSize:13}}>{r.itemDescription}</div>
          {r.revisedAt&&<div style={{fontSize:10,color:T.teal,marginTop:1}}>Revised {r.revisedAt}</div>}
        </td>
        <td style={{fontSize:12,color:T.text2}}>{r.vendor}</td>
        <td>{r.link?<a href={r.link} target="_blank" rel="noreferrer">View ↗</a>:"—"}</td>
        <td style={{textAlign:"center"}}>{r.quantity}</td>
        <td>{fmtMoney(r.pricePerUnit)}</td>
        <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
        <td style={{fontSize:11,color:T.text2}}>{r.phase.split("—")[0].trim()}</td>
        {p.actions ? <td>{p.actions(r)}</td> : <td><StatusBadge r={r}/></td>}
      </tr>
    );
  }

  var studentNames = useMemo(function(){
    var seen={}, names=[];
    requests.forEach(function(r){if(r.studentName&&!seen[r.studentName]){seen[r.studentName]=1;names.push(r.studentName);}});
    return names.sort();
  }, [requests]);

  return (
    <Page wide={true}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:700,letterSpacing:"-.03em"}}>Teacher Dashboard</h2>
          <p style={{color:T.text2,fontSize:13,marginTop:2}}>Review, revise, and send requests to JD</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={function(){setShowRoster(true);}}>👥 Manage Roster</button>
          <button className="btn btn-ghost btn-sm" onClick={exportCSV}>⬇ Export CSV</button>
          <button className="btn btn-ghost btn-sm" onClick={archiveYear} style={{color:T.red}}>📦 Archive Year</button>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10}}>
        {[{v:requests.length,l:"Total",c:T.text1},{v:pending.length,l:"Pending Review",c:T.orange},
          {v:requests.filter(function(r){return r.teacherStatus==="Revision";}).length,l:"Needs Revision",c:"#f5a623"},
          {v:readySend.length,l:"Ready for JD",c:T.blue},
          {v:submitted.filter(function(r){return !r.received;}).length,l:"In Progress",c:T.purple},
          {v:requests.filter(function(r){return r.received;}).length,l:"Received",c:T.green}].map(function(s){return (
          <div key={s.l} className="stat"><div className="stat-v" style={{color:s.c,fontSize:22}}>{s.v}</div><div className="stat-l">{s.l}</div></div>
        );})}
      </div>

      {readySend.length>0 && (
        <div className="banner" style={{background:"linear-gradient(135deg,#0071e3,#0077ed)"}}>
          <div>
            <div style={{color:"#fff",fontWeight:600,fontSize:15}}>{readySend.length} item{readySend.length!==1?"s":""} ready for JD</div>
            <div style={{color:"rgba(255,255,255,.7)",fontSize:12,marginTop:2}}>Batch total: {fmtMoney(batchTotal)}</div>
          </div>
          <button className="btn" style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.25)"}} onClick={function(){setTab("readysend");}}>Review &amp; Submit →</button>
        </div>
      )}

      <div className="tabs">
        {[["pending","Pending ("+pending.length+")"],["readysend","Submit to JD ("+readySend.length+")"],["all","All Requests"],["submitted","Submitted ("+submitted.length+")"]].map(function(kl){return (
          <button key={kl[0]} className={"tab"+(tab===kl[0]?" on":"")} onClick={function(){setTab(kl[0]);}}>{kl[1]}</button>
        );})}
      </div>

      {tab==="pending" && (
        <div className="card">
          <div className="card-hd">
            <h3>Awaiting Your Review</h3>
            {onHold.length>0&&<span style={{fontSize:12,color:T.purple,fontWeight:500}}>{onHold.length} on hold</span>}
          </div>
          {pending.length===0 ? <div className="empty"><div className="empty-icon">🎉</div><p>All caught up!</p></div> : (
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th></th><th>Student</th><th>Item</th><th>Vendor</th><th>Link</th><th>Qty</th><th>Unit $</th><th>Total</th><th>Phase</th><th>Actions</th></tr></thead>
              <tbody>{pending.map(function(r){return <TRow key={r.id} r={r} actions={function(r){return (
                <div style={{display:"flex",gap:5}}>
                  <button className="btn btn-green btn-sm" onClick={function(){setSel(Object.assign({},r,{action:"approve"}));setNotes("");}}>Approve</button>
                  <button className="btn btn-yellow btn-sm" onClick={function(){setSel(Object.assign({},r,{action:"revise"}));setNotes("");}}>Revise</button>
                  <button className="btn btn-red btn-sm" onClick={function(){setSel(Object.assign({},r,{action:"deny"}));setNotes("");}}>Deny</button>
                  <button className="btn btn-ghost btn-sm" onClick={function(){toggleHold(r.id);}}>Hold</button>
                </div>
              );}}/>;})}
              </tbody>
            </table></div>
          )}
          {onHold.length>0&&(
            <div style={{borderTop:"1px solid "+T.border}}>
              <div style={{padding:"10px 20px",fontSize:12,fontWeight:500,color:T.purple}}>On Hold ({onHold.length})</div>
              <div style={{overflowX:"auto"}}><table className="tbl"><tbody>
                {onHold.map(function(r){return <TRow key={r.id} r={r} actions={function(r){return (
                  <div style={{display:"flex",gap:5}}>
                    <button className="btn btn-green btn-sm" onClick={function(){setSel(Object.assign({},r,{action:"approve"}));setNotes("");}}>Approve</button>
                    <button className="btn btn-ghost btn-sm" onClick={function(){toggleHold(r.id);}}>Remove Hold</button>
                  </div>
                );}}/>;})}
              </tbody></table></div>
            </div>
          )}
        </div>
      )}

      {tab==="readysend" && (
        <div className="card">
          <div className="card-hd">
            <h3>Ready to Submit to JD</h3>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {readySend.length>0&&<span style={{fontWeight:600,color:T.green,fontSize:13}}>Total: {fmtMoney(batchTotal)}</span>}
              <button className="btn btn-blue btn-sm" disabled={readySend.length===0} onClick={function(){submitBatch(readySend.map(function(r){return r.id;}));}}>Submit All {readySend.length} to JD →</button>
            </div>
          </div>
          {readySend.length>0&&<div style={{padding:"12px 20px",borderBottom:"1px solid "+T.border,background:"#fafafa"}}>
            <input className="inp" value={batchNote} onChange={function(e){setBatchNote(e.target.value);}} placeholder="Optional note to JD with this batch…" style={{maxWidth:500,fontSize:13}}/>
          </div>}
          {readySend.length===0?<div className="empty"><div className="empty-icon">📭</div><p>Nothing ready to submit yet.</p></div>:(
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th></th><th>Student</th><th>Item</th><th>Vendor</th><th>Link</th><th>Qty</th><th>Unit $</th><th>Total</th><th>Phase</th><th>Action</th></tr></thead>
              <tbody>{readySend.map(function(r){return <TRow key={r.id} r={r} actions={function(r){return <button className="btn btn-blue btn-sm" onClick={function(){submitBatch([r.id]);}}>Submit →</button>;}}/>;})}
              </tbody>
              <tfoot><tr>
                <td colSpan={7} style={{textAlign:"right",fontWeight:600,background:"#fafafa",padding:"11px 14px",fontSize:13}}>Total:</td>
                <td style={{fontWeight:700,background:"#fafafa",padding:"11px 14px"}}>{fmtMoney(batchTotal)}</td>

              </tr></tfoot>
            </table></div>
          )}
        </div>
      )}

      {tab==="all" && (
        <div className="card">
          <div className="card-hd">
            <h3>All Requests</h3>

              <select className="pill-input" style={{width:150}} value={filterS} onChange={function(e){setFilterS(e.target.value);}}>
                <option value="">All Students</option>{studentNames.map(function(s){return <option key={s}>{s}</option>;})}
              </select>
              <select className="pill-input" style={{width:140}} value={filterP} onChange={function(e){setFilterP(e.target.value);}}>
                <option value="">All Phases</option>{PHASES.map(function(p){return <option key={p} value={p}>{p.split("—")[0].trim()}</option>;})}
              </select>
            </div>
          </div>
          {allF.length===0?<div className="empty"><p>No requests.</p></div>:(
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th></th><th>Student</th><th>Item</th><th>Vendor</th><th>Link</th><th>Qty</th><th>Unit $</th><th>Total</th><th>Phase</th><th>Status</th></tr></thead>
              <tbody>{allF.map(function(r){return <TRow key={r.id} r={r} actions={null}/>;})}
              </tbody>
            </table></div>
          )}
        </div>
      )}

      {tab==="submitted" && (
        <div className="card">
          <div className="card-hd"><h3>Submitted to JD</h3></div>
          {submitted.length===0?<div className="empty"><p>Nothing submitted yet.</p></div>:(
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Total</th><th>Submitted</th><th>JD</th><th>Ordered</th><th>Received</th></tr></thead>
              <tbody>{submitted.map(function(r){return (
                <tr key={r.id}>
                  <td style={{fontWeight:500}}>{r.studentName}</td>
                  <td style={{fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12,color:T.text2}}>{r.vendor}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td style={{fontSize:11,color:T.text2}}>{r.dateSubmitted||"—"}</td>
                  <td>{r.jdApproval==="Approved"?<span className="badge b-appr">Approved</span>:r.jdApproval==="Denied"?<span className="badge b-deny">Denied</span>:<span className="badge b-pend">Pending</span>}</td>
                  <td>{r.jessicaOrdered?<span className="badge b-ordr">✓</span>:"—"}</td>
                  <td>{r.received?<span className="badge b-recv">✓</span>:"—"}</td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}

      {sel&&(
        <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)setSel(null);}}>
          <div className="modal" style={{maxWidth:460}}>
            <div className="modal-hd">
              <h2>{sel.action==="approve"?"Approve Request":sel.action==="revise"?"Request Changes":"Deny Request"}</h2>
              <button className="close-btn" onClick={function(){setSel(null);}}>×</button>
            </div>
            <div className="modal-bd">
              <div style={{background:"#fafafa",borderRadius:12,padding:"12px 16px"}}>
                <div style={{fontWeight:600}}>{sel.itemDescription}</div>
                <div style={{color:T.text2,fontSize:13,marginTop:3}}>{sel.studentName} · {sel.vendor} · {fmtMoney(getTotal(sel))}</div>
              </div>
              <div className="field">
                <label>{sel.action==="approve"?"Note for student (optional)":sel.action==="revise"?"What needs to change? Student will see this and receive an email.":"Reason for denial — student will be notified."}</label>
                <textarea className="inp" rows={3} value={notes} onChange={function(e){setNotes(e.target.value);}} style={{resize:"vertical"}} placeholder={sel.action==="revise"?"e.g. Please find this on Amazon instead.":sel.action==="deny"?"e.g. Outside our budget for this phase.":""}/>
              </div>
              {!EMAIL_CFG.enabled&&<div style={{fontSize:11,color:T.text3,background:"#fafafa",borderRadius:8,padding:"8px 12px"}}>📧 Email notifications are disabled. Enable EmailJS in the config to notify students automatically.</div>}
            </div>
            <div className="modal-ft">
              <button onClick={function(){setSel(null);}} className="btn btn-ghost">Cancel</button>
              {sel.action==="approve"&&<button onClick={function(){setStatus(sel.id,"Approved");}} className="btn btn-green">Approve</button>}
              {sel.action==="revise"&&<button onClick={function(){if(!notes.trim()){alert("Please add a note so the student knows what to change.");return;}setStatus(sel.id,"Revision");}} className="btn btn-yellow">Request Changes</button>}
              {sel.action==="deny"&&<button onClick={function(){setStatus(sel.id,"Denied");}} className="btn btn-red">Deny</button>}
            </div>
          </div>
        </div>
      )}

      {showRoster&&(
        <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)setShowRoster(false);}}>
          <div className="modal">
            <div className="modal-hd">
              <h2>Student Roster</h2>
              <button className="close-btn" onClick={function(){setShowRoster(false);}}>×</button>
            </div>
            <div className="modal-bd">
              <div style={{fontSize:13,color:T.text2,lineHeight:1.6}}>
                Paste your roster as <strong>Name, Email</strong> — one student per line.<br/>
                Example:<br/>
                <code style={{background:"#f5f5f7",borderRadius:6,padding:"2px 6px",fontSize:12}}>Lexi, lexi.smith@school.edu</code>
              </div>
              <div className="field">
                <label>Roster (Name, Email — one per line)</label>
                <textarea className="inp" rows={12} value={rosterCsv} onChange={function(e){setRosterCsv(e.target.value);}} style={{resize:"vertical",fontFamily:"monospace",fontSize:12}} placeholder={"Alishya, alishya@school.edu\nAnnie, annie@school.edu\n…"}/>
              </div>
              {roster&&roster.length>0&&(
                <div style={{fontSize:12,color:T.text2}}>Current roster: {roster.length} students {roster.filter(function(s){return s.email;}).length} with emails</div>
              )}
            </div>
            <div className="modal-ft">
              <button onClick={function(){setShowRoster(false);}} className="btn btn-ghost">Cancel</button>
              <button onClick={saveRoster} className="btn btn-blue">Save Roster</button>
            </div>
          </div>
        </div>
      )}
    </Page>
  );
}

// ── JD DASHBOARD ──────────────────────────────────────────────────────────────
function JDDash(props) {
  var requests=props.requests, onSave=props.onSave;
  var _t=useState("review"); var tab=_t[0]; var setTab=_t[1];
  var _s=useState(null); var sel=_s[0]; var setSel=_s[1];
  var _n=useState(""); var notes=_n[0]; var setNotes=_n[1];
  var _hs=useState(""); var histSearch=_hs[0]; var setHistSearch=_hs[1];
  var _hd1=useState(""); var histFrom=_hd1[0]; var setHistFrom=_hd1[1];
  var _hd2=useState(""); var histTo=_hd2[0]; var setHistTo=_hd2[1];
  var _ar=useState([]); var archives=_ar[0]; var setArchives=_ar[1];
  var _av=useState(""); var archiveView=_av[0]; var setArchiveView=_av[1];
  var _ad=useState([]); var archiveData=_ad[0]; var setArchiveData=_ad[1];
  var _al=useState(false); var archiveLoading=_al[0]; var setArchiveLoading=_al[1];

  useEffect(function(){dbListArchives(function(keys){setArchives(keys);});}, []);
  useEffect(function(){
    if (!archiveView){setArchiveData([]);return;}
    setArchiveLoading(true);
    dbLoad(archiveView, function(d){setArchiveData(d||[]);setArchiveLoading(false);});
  }, [archiveView]);

  var toReview = useMemo(function(){return requests.filter(function(r){return r.submittedForOrder&&r.jdApproval==="Pending";});}, [requests]);
  var approved = useMemo(function(){return requests.filter(function(r){return r.jdApproval==="Approved"&&!r.jessicaOrdered;});}, [requests]);

  var fullHistory = useMemo(function(){
    var src=archiveView?archiveData:requests;
    var out=src.filter(function(r){return r.submittedForOrder;});
    if(histSearch){var s=histSearch.toLowerCase();out=out.filter(function(r){return (r.studentName||"").toLowerCase().indexOf(s)>=0||(r.itemDescription||"").toLowerCase().indexOf(s)>=0;});}
    if(histFrom) out=out.filter(function(r){return r.dateSubmitted&&r.dateSubmitted>=histFrom;});
    if(histTo)   out=out.filter(function(r){return r.dateSubmitted&&r.dateSubmitted<=histTo;});
    return out.sort(function(a,b){return (b.dateSubmitted||"").localeCompare(a.dateSubmitted||"");});
  }, [archiveView?archiveData:requests,histSearch,histFrom,histTo,archiveView,archiveData]);

  function decide(id,decision) {
    var ts=new Date().toISOString();
    var updated=requests.map(function(r){return r.id===id?Object.assign({},r,{jdApproval:decision,jdNotes:notes,jdActionAt:ts,jdActionBy:"JD Bennett"}):r;});
    onSave(updated);
    setSel(null);setNotes("");
  }
  function approveAll() {
    var ts=new Date().toISOString();
    var ids=toReview.map(function(r){return r.id;});
    onSave(requests.map(function(r){return ids.indexOf(r.id)>=0?Object.assign({},r,{jdApproval:"Approved",jdNotes:"",jdActionAt:ts,jdActionBy:"JD Bennett"}):r;}));
  }

  var reviewTotal   = toReview.reduce(function(s,r){return s+(getTotal(r)||0);},0);
  var approvedTotal = approved.reduce(function(s,r){return s+(getTotal(r)||0);},0);

  return (
    <Page wide={true}>
      <div>
        <h2 style={{fontSize:22,fontWeight:700,letterSpacing:"-.03em"}}>Department Head</h2>
        <p style={{color:T.text2,fontSize:13,marginTop:2}}>Review purchase batches submitted by Mr. Weymuth</p>
      </div>

      <div style={{background:"#1e293b",color:"#94a3b8",fontSize:11,padding:"8px 14px",borderRadius:10,fontFamily:"monospace"}}>
        DEBUG: total={requests.length} | submitted={requests.filter(function(r){return r.submittedForOrder;}).length} | toReview={toReview.length}
      </div>

      {toReview.length>0&&(
        <div className="banner" style={{background:"linear-gradient(135deg,#7c3aed,#9333ea)"}}>
          <div>
            <div style={{color:"#fff",fontWeight:600,fontSize:15}}>{toReview.length} item{toReview.length!==1?"s":""} awaiting your review</div>
            <div style={{color:"rgba(255,255,255,.65)",fontSize:12,marginTop:2}}>Batch total: {fmtMoney(reviewTotal)}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn" style={{background:"rgba(255,255,255,.12)",color:"#fff",border:"1px solid rgba(255,255,255,.2)"}} onClick={function(){setTab("review");}}>Review Each →</button>
            <button className="btn" style={{background:"#fff",color:"#7c3aed",fontWeight:600}} onClick={approveAll}>✓ Approve All</button>
          </div>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
        {[{v:toReview.length,l:"Awaiting Review",c:T.purple},{v:fmtMoney(reviewTotal),l:"Batch Value",c:T.purple},
          {v:fmtMoney(approvedTotal),l:"Approved — Not Ordered",c:T.blue},{v:requests.filter(function(r){return r.received;}).length,l:"Received",c:T.green}].map(function(s){return (
          <div key={s.l} className="stat"><div className="stat-v" style={{color:s.c,fontSize:22}}>{s.v}</div><div className="stat-l">{s.l}</div></div>
        );})}
      </div>

      <div className="tabs">
        {[["review","Review ("+toReview.length+")"],["approved","Approved ("+approved.length+")"],["history","History"]].map(function(kl){return (
          <button key={kl[0]} className={"tab"+(tab===kl[0]?" on":"")} onClick={function(){setTab(kl[0]);}}>{kl[1]}</button>
        );})}
      </div>

      {tab==="review"&&(
        <div className="card">
          <div className="card-hd"><h3>Submitted by Mr. Weymuth</h3>{toReview.length>0&&<span style={{fontWeight:600,fontSize:13}}>{fmtMoney(reviewTotal)}</span>}</div>
          {toReview.length===0?<div className="empty"><div className="empty-icon">🎉</div><p>Nothing to review right now.</p></div>:(
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th></th><th>Student</th><th>Item</th><th>Vendor</th><th>Link</th><th>Qty</th><th>Unit $</th><th>Total</th><th>Details</th><th>Actions</th></tr></thead>
              <tbody>{toReview.map(function(r){return (
                <tr key={r.id} style={{background:r.priority==="High"?"#fffbf5":""}}>
                  <td>{r.priority==="High"&&<span style={{fontSize:12}}>🔴</span>}</td>
                  <td style={{fontWeight:500}}>{r.studentName}</td>
                  <td style={{maxWidth:180,fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12,color:T.text2}}>{r.vendor}</td>
                  <td>{r.link?<a href={r.link} target="_blank" rel="noreferrer">View ↗</a>:"—"}</td>
                  <td style={{textAlign:"center"}}>{r.quantity}</td>
                  <td>{fmtMoney(r.pricePerUnit)}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td style={{maxWidth:140,fontSize:11,color:T.text2}}>{r.additionalDetails||"—"}</td>
                  <td><div style={{display:"flex",gap:5}}>
                    <button className="btn btn-green btn-sm" onClick={function(){setSel(Object.assign({},r,{action:"approve"}));setNotes("");}}>Approve</button>
                    <button className="btn btn-red btn-sm" onClick={function(){setSel(Object.assign({},r,{action:"deny"}));setNotes("");}}>Deny</button>
                  </div></td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}

      {tab==="approved"&&(
        <div className="card">
          <div className="card-hd"><h3>Approved — Awaiting Jessica</h3>{approved.length>0&&<span style={{fontWeight:600,color:T.green,fontSize:13}}>{fmtMoney(approvedTotal)}</span>}</div>
          {approved.length===0?<div className="empty"><p>Nothing waiting to be ordered.</p></div>:(
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Link</th><th>Qty</th><th>Total</th></tr></thead>
              <tbody>{approved.map(function(r){return (
                <tr key={r.id}>
                  <td style={{fontWeight:500}}>{r.studentName}</td>
                  <td style={{fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12,color:T.text2}}>{r.vendor}</td>
                  <td>{r.link?<a href={r.link} target="_blank" rel="noreferrer">View ↗</a>:"—"}</td>
                  <td style={{textAlign:"center"}}>{r.quantity}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}

      {tab==="history"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div className="card">
            <div className="card-hd" style={{flexWrap:"wrap",gap:8}}>
              <h3>Full Submission History</h3>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <select className="pill-input" style={{width:160}} value={archiveView} onChange={function(e){setArchiveView(e.target.value);}}>
                  <option value="">Current Year</option>
                  {archives.map(function(k){return <option key={k} value={k}>{k.replace("makerslab-archive-","")}</option>;})}
                </select>
                <input className="pill-input" style={{width:160}} value={histSearch} onChange={function(e){setHistSearch(e.target.value);}} placeholder="Search student or item…"/>
                <input className="pill-input" type="date" style={{width:130}} value={histFrom} onChange={function(e){setHistFrom(e.target.value);}}/>
                <span style={{fontSize:11,color:T.text3}}>to</span>
                <input className="pill-input" type="date" style={{width:130}} value={histTo} onChange={function(e){setHistTo(e.target.value);}}/>
                {(histSearch||histFrom||histTo)&&<button className="btn btn-ghost btn-sm" onClick={function(){setHistSearch("");setHistFrom("");setHistTo("");}}>Clear</button>}
              </div>
            </div>
            {archiveLoading?<div className="empty"><p>Loading archive…</p></div>:
            fullHistory.length===0?<div className="empty"><div className="empty-icon">📋</div><p>No submissions match your filters.</p></div>:(
              <div style={{overflowX:"auto"}}><table className="tbl">
                <thead><tr><th>Date</th><th>Student</th><th>Item</th><th>Vendor</th><th>Link</th><th>Qty</th><th>Total</th><th>Priority</th><th>Teacher</th><th>JD</th><th>Ordered</th><th>Received</th><th>Tracking</th></tr></thead>
                <tbody>{fullHistory.map(function(r){return (
                  <tr key={r.id} style={{background:r.priority==="High"?"#fffbf5":""}}>
                    <td style={{fontSize:11,whiteSpace:"nowrap",color:T.text2}}>{r.dateSubmitted||"—"}</td>
                    <td style={{fontWeight:500}}>{r.studentName}</td>
                    <td style={{maxWidth:180,fontWeight:500,fontSize:13}}>{r.priority==="High"&&<span style={{marginRight:4}}>🔴</span>}{r.itemDescription}</td>
                    <td style={{fontSize:12,color:T.text2}}>{r.vendor}</td>
                    <td>{r.link?<a href={r.link} target="_blank" rel="noreferrer">View ↗</a>:"—"}</td>
                    <td style={{textAlign:"center"}}>{r.quantity}</td>
                    <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                    <td style={{fontSize:11}}>{r.priority||"Normal"}</td>
                    <td style={{fontSize:11}}>
                      {r.teacherActionAt?<div><span className={"badge "+(r.teacherStatus==="Approved"?"b-appr":"b-deny")} style={{fontSize:10}}>{r.teacherStatus}</span><div style={{fontSize:10,color:T.text3,marginTop:2}}>{new Date(r.teacherActionAt).toLocaleDateString()}</div></div>:"—"}
                    </td>
                    <td style={{fontSize:11}}>
                      {r.jdActionAt?<div><span className={"badge "+(r.jdApproval==="Approved"?"b-appr":"b-deny")} style={{fontSize:10}}>{r.jdApproval}</span><div style={{fontSize:10,color:T.text3,marginTop:2}}>{new Date(r.jdActionAt).toLocaleDateString()}</div></div>:<span className="badge b-pend" style={{fontSize:10}}>{r.jdApproval||"Pending"}</span>}

                    <td style={{fontSize:11,color:T.text2}}>{r.dateOrdered||"—"}</td>

                  </tr>
                );})}</tbody>
              </table></div>
            )}
          </div>
          <div style={{fontSize:11,color:T.text3,textAlign:"center"}}>{fullHistory.length} record{fullHistory.length!==1?"s":""}</div>
        </div>
      )}

      {sel&&(
        <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)setSel(null);}}>
          <div className="modal" style={{maxWidth:460}}>
            <div className="modal-hd">
              <h2>{sel.action==="approve"?"Approve Request":"Deny Request"}</h2>
              <button className="close-btn" onClick={function(){setSel(null);}}>×</button>
            </div>
            <div className="modal-bd">
              <div style={{background:"#fafafa",borderRadius:12,padding:"12px 16px"}}>
                <div style={{fontWeight:600}}>{sel.itemDescription}</div>
                <div style={{color:T.text2,fontSize:13,marginTop:3}}>{sel.studentName} · {sel.vendor} · {fmtMoney(getTotal(sel))}</div>
                {sel.link&&<a href={sel.link} target="_blank" rel="noreferrer" style={{fontSize:12,color:T.blue,display:"block",marginTop:4}}>View item ↗</a>}
              </div>
              <div className="field"><label>Notes (optional)</label>
                <textarea className="inp" rows={3} value={notes} onChange={function(e){setNotes(e.target.value);}} style={{resize:"vertical"}}/>
              </div>
            </div>
            <div className="modal-ft">
              <button onClick={function(){setSel(null);}} className="btn btn-ghost">Cancel</button>
              {sel.action==="approve"?<button onClick={function(){decide(sel.id,"Approved");}} className="btn btn-green">Approve</button>:<button onClick={function(){decide(sel.id,"Denied");}} className="btn btn-red">Deny</button>}
            </div>
          </div>
        </div>
      )}
    </Page>
  );
}

// ── JESSICA DASHBOARD ─────────────────────────────────────────────────────────
function JessicaDash(props) {
  var requests=props.requests, onSave=props.onSave;
  var _t=useState("order"); var tab=_t[0]; var setTab=_t[1];
  var toOrder  = useMemo(function(){return requests.filter(function(r){return r.jdApproval==="Approved"&&!r.jessicaOrdered;});}, [requests]);
  var ordered  = useMemo(function(){return requests.filter(function(r){return r.jessicaOrdered&&!r.received;});}, [requests]);
  var received = useMemo(function(){return requests.filter(function(r){return r.received;});}, [requests]);

  function markOrdered(id){var ts=new Date().toISOString();onSave(requests.map(function(r){return r.id===id?Object.assign({},r,{jessicaOrdered:true,dateOrdered:today(),jessicaOrderedAt:ts}):r;}));}
  function markReceived(id){var ts=new Date().toISOString();onSave(requests.map(function(r){return r.id===id?Object.assign({},r,{received:true,dateReceived:today(),receivedAt:ts}):r;}));}
  function markAllOrdered(){var ts=new Date().toISOString();var ids=toOrder.map(function(r){return r.id;});onSave(requests.map(function(r){return ids.indexOf(r.id)>=0?Object.assign({},r,{jessicaOrdered:true,dateOrdered:today(),jessicaOrderedAt:ts}):r;}));}
  function setTracking(id,val){onSave(requests.map(function(r){return r.id===id?Object.assign({},r,{trackingNumber:val}):r;}));}

  var orderTotal = toOrder.reduce(function(s,r){return s+(getTotal(r)||0);},0);

  return (
    <Page wide={true}>
      <div>
        <h2 style={{fontSize:22,fontWeight:700,letterSpacing:"-.03em"}}>Purchasing</h2>
        <p style={{color:T.text2,fontSize:13,marginTop:2}}>JD-approved items ready to order</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
        {[{v:toOrder.length,l:"Ready to Order",c:T.orange},{v:fmtMoney(orderTotal),l:"Order Value",c:T.orange},
          {v:ordered.length,l:"In Transit",c:T.blue},{v:received.length,l:"Received",c:T.green}].map(function(s){return (
          <div key={s.l} className="stat"><div className="stat-v" style={{color:s.c,fontSize:22}}>{s.v}</div><div className="stat-l">{s.l}</div></div>
        );})}
      </div>
      <div className="tabs">
        {[["order","To Order ("+toOrder.length+")"],["ordered","Ordered ("+ordered.length+")"],["received","Received ("+received.length+")"]].map(function(kl){return (
          <button key={kl[0]} className={"tab"+(tab===kl[0]?" on":"")} onClick={function(){setTab(kl[0]);}}>{kl[1]}</button>
        );})}
      </div>
      {tab==="order"&&(
        <div className="card">
          <div className="card-hd">
            <h3>Ready to Order</h3>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              {toOrder.length>0&&<span style={{fontWeight:600,color:T.green,fontSize:13}}>Total: {fmtMoney(orderTotal)}</span>}
              <button className="btn btn-orange btn-sm" disabled={toOrder.length===0} onClick={markAllOrdered}>Mark All Ordered</button>
            </div>
          </div>
          {toOrder.length===0?<div className="empty"><div className="empty-icon">✅</div><p>Nothing to order!</p></div>:(
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th></th><th>Student</th><th>Item</th><th>Vendor</th><th>Link</th><th>Qty</th><th>Unit $</th><th>Total</th><th>Action</th></tr></thead>
              <tbody>{toOrder.map(function(r){return (
                <tr key={r.id} style={{background:r.priority==="High"?"#fffbf5":""}}>
                  <td>{r.priority==="High"&&<span style={{fontSize:12}}>🔴</span>}</td>
                  <td style={{fontWeight:500}}>{r.studentName}</td>
                  <td style={{maxWidth:180,fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12,color:T.text2}}>{r.vendor}</td>
                  <td>{r.link?<a href={r.link} target="_blank" rel="noreferrer">View ↗</a>:"—"}</td>
                  <td style={{textAlign:"center"}}>{r.quantity}</td>
                  <td>{fmtMoney(r.pricePerUnit)}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td><button className="btn btn-orange btn-sm" onClick={function(){markOrdered(r.id);}}>Mark Ordered</button></td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}
      {tab==="ordered"&&(
        <div className="card">
          <div className="card-hd"><h3>In Transit</h3></div>
          {ordered.length===0?<div className="empty"><p>Nothing in transit.</p></div>:(
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Total</th><th>Date Ordered</th><th>Tracking</th><th>Action</th></tr></thead>
              <tbody>{ordered.map(function(r){return (
                <tr key={r.id}>
                  <td style={{fontWeight:500}}>{r.studentName}</td>
                  <td style={{fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12,color:T.text2}}>{r.vendor}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td style={{fontSize:12,color:T.text2}}>{r.dateOrdered||"—"}</td>
                  <td><input className="inp" style={{fontSize:12,padding:"5px 8px",width:170}} value={r.trackingNumber||""} onChange={function(e){setTracking(r.id,e.target.value);}} placeholder="Tracking # or URL"/></td>
                  <td><button className="btn btn-green btn-sm" onClick={function(){markReceived(r.id);}}>✓ Received</button></td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}
      {tab==="received"&&(
        <div className="card">
          <div className="card-hd"><h3>Received</h3></div>
          {received.length===0?<div className="empty"><p>Nothing received yet.</p></div>:(
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Total</th><th>Ordered</th><th>Received</th><th>Tracking</th></tr></thead>
              <tbody>{received.map(function(r){return (
                <tr key={r.id}>
                  <td style={{fontWeight:500}}>{r.studentName}</td>
                  <td style={{fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12,color:T.text2}}>{r.vendor}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td style={{fontSize:11,color:T.text2}}>{r.dateOrdered||"—"}</td>
                  <td style={{fontSize:11,color:T.text2}}>{r.dateReceived||"—"}</td>
                  <td style={{fontSize:11}}>{r.trackingNumber?<a href={r.trackingNumber.startsWith("http")?r.trackingNumber:"#"} target="_blank" rel="noreferrer" style={{color:T.blue}}>{r.trackingNumber}</a>:"—"}</td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}
    </Page>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  var _u=useState(null); var user=_u[0]; var setUser=_u[1];
  var _r=useState(null); var requests=_r[0]; var setRequests=_r[1];
  var _ro=useState([]); var roster=_ro[0]; var setRoster=_ro[1];
  var _ls=useState(null); var lastSync=_ls[0]; var setLastSync=_ls[1];

  function refresh() {
    dbLoad(DB_KEY, function(d){ setRequests(d||[]); setLastSync(new Date().toLocaleTimeString()); });
  }
  function refreshRoster() {
    dbLoad(ROSTER_KEY, function(d){ if (d) setRoster(Array.isArray(d)?d:[]); });
  }

  useEffect(function(){
    refresh(); refreshRoster();
    var t=setInterval(refresh, 30000);
    return function(){clearInterval(t);};
  }, []);

  function handleSave(updated){ setRequests(updated); dbSave(DB_KEY, updated, null); }
  function handleSaveRoster(updated){ setRoster(updated); dbSave(ROSTER_KEY, updated, null); }

  if (requests===null) return (
    <div style={{minHeight:"100vh",background:"#000",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <GS/>
      <div style={{textAlign:"center"}}>
        <div style={{width:32,height:32,border:"2.5px solid #222",borderTopColor:"#f04e1f",borderRadius:"50%",margin:"0 auto 12px",animation:"spin .7s linear infinite"}}/>
        <p style={{color:"#555",fontSize:12}}>Loading…</p>
      </div>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    </div>
  );

  if (!user) return <><GS/><Login onLogin={setUser} roster={roster}/></>;

  return (
    <>
      <GS/>
      <div style={{minHeight:"100vh",background:T.bg}}>
        <Topbar user={user} onLogout={function(){setUser(null);}} onRefresh={refresh} lastSync={lastSync}/>
        {user.role==="student"  && <StudentPortal user={user} requests={requests} onSave={handleSave} roster={roster}/>}
        {user.role==="teacher"  && <TeacherDash   user={user} requests={requests} onSave={handleSave} roster={roster} onSaveRoster={handleSaveRoster}/>}
        {user.role==="jd"       && <JDDash        user={user} requests={requests} onSave={handleSave}/>}
        {user.role==="jessica"  && <JessicaDash   user={user} requests={requests} onSave={handleSave}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
