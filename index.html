// ── DB helpers — zero async/await ─────────────────────────────────────────────
function dbLoad(cb) {
  sb.from("kv_store").select("value").eq("key", DB_KEY).single().then(function(res) {
    if (res.error || !res.data) { cb([]); return; }
    var v = res.data.value;
    cb(Array.isArray(v) ? v : (typeof v === "string" ? JSON.parse(v) : []));
  }).catch(function() { cb([]); });
}

function dbSave(data, cb) {
  console.log("dbSave called, records:", data.length);
  sb.from("kv_store").upsert({key: DB_KEY, value: data}, {onConflict: "key"}).then(function(res) {
    if (res.error) { console.error("Save error:", res.error); }
    else { console.log("Save OK"); }
    if (cb) cb();
  }).catch(function(e) { console.error("Save exception:", e); if (cb) cb(); });
}

function StatusBadge(props) {

  if (r.jdApproval==="Approved")    return React.createElement("span",{className:"badge b-ordr"},"Awaiting Order");
  if (r.jdApproval==="Denied")      return React.createElement("span",{className:"badge b-deny"},"JD Denied");
  if (r.submittedForOrder)          return React.createElement("span",{className:"badge b-ordr"},"With JD");
  if (r.teacherStatus==="Approved") return React.createElement("span",{className:"badge b-appr"},"Teacher ✓");
  if (r.teacherStatus==="Denied")   return React.createElement("span",{className:"badge b-deny"},"Denied");
  if (r.teacherStatus==="Revision") return React.createElement("span",{className:"badge b-revise"},"⚠ Needs Revision");
  if (r.onHold)                     return React.createElement("span",{className:"badge b-hold"},"On Hold");
  return React.createElement("span",{className:"badge b-pend"},"Pending");
}

// ── STUDENT PORTAL ────────────────────────────────────────────────────────────
function StudentPortal(props) {
  var user=props.user, requests=props.requests, onSave=props.onSave;
  var mine = useMemo(function(){return requests.filter(function(r){return r.studentName===user.name;});}, [requests,user.name]);
  var needsRevision = useMemo(function(){return mine.filter(function(r){return r.teacherStatus==="Revision";});}, [mine]);
  var _sf = useState(false); var showForm=_sf[0]; var setShowForm=_sf[1];
  var _ei = useState(null); var editingId=_ei[0]; var setEditingId=_ei[1];
  var BLANK = {itemDescription:"",vendor:"",vendorOther:"",link:"",quantity:"",pricePerUnit:"",consumableOrDurable:"Consumable",additionalDetails:"",phase:PHASES[0]};
  var _f = useState(BLANK); var form=_f[0]; var setForm=_f[1];

  function sf(k,v){setForm(function(p){var n={}; for(var x in p)n[x]=p[x]; n[k]=v; return n;});}

  function openNew(){setEditingId(null);setForm(BLANK);setShowForm(true);}

      link:r.link||"",quantity:String(r.quantity),pricePerUnit:String(r.pricePerUnit),

      var updated = requests.map(function(r) {

        return Object.assign({},r,{itemDescription:form.itemDescription.trim(),vendor:vendorVal,
          link:form.link.trim(),quantity:Number(form.quantity)||1,pricePerUnit:Number(form.pricePerUnit)||0,
          consumableOrDurable:form.consumableOrDurable,additionalDetails:form.additionalDetails.trim(),

      onSave(updated);

      var req = {id:genId(),studentName:user.name,itemDescription:form.itemDescription.trim()||"(no description)",
        vendor:vendorVal||"Amazon",link:form.link.trim(),quantity:Number(form.quantity)||1,

                  <td style={{textAlign:"center"}}>{r.quantity}</td>
                  <td>{fmtMoney(r.pricePerUnit)}</td>

                  <td style={{fontSize:11,color:"#9ca3af"}}>{r.phase.split("—")[0].trim()}</td>

            </div>
            <form onSubmit={submit}>
              <div className="modal-bd">
                <div className="field"><label>Item Description</label>
                  <input className="inp" value={form.itemDescription} onChange={function(e){sf("itemDescription",e.target.value);}} placeholder="Be specific — brand, model, size, color…"/>
                </div>
                <div className="g2">
                  <div className="field"><label>Vendor</label>
                    <select className="inp" value={form.vendor} onChange={function(e){sf("vendor",e.target.value);}}>
                      <option value="">Select…</option>{VENDORS.map(function(v){return <option key={v}>{v}</option>;})}
                    </select>
                  </div>
                  {form.vendor==="Other" && <div className="field"><label>Vendor Name</label>
                    <input className="inp" value={form.vendorOther} onChange={function(e){sf("vendorOther",e.target.value);}} placeholder="e.g. Rockler"/>
                  </div>}
                </div>
                <div className="field"><label>Link to Item</label>
                  <input className="inp" type="url" value={form.link} onChange={function(e){sf("link",e.target.value);}} placeholder="https://…"/>
                </div>
                <div className="g2">
                  <div className="field"><label>Quantity</label>
                    <input className="inp" type="number" min="1" step="1" value={form.quantity} onChange={function(e){sf("quantity",e.target.value);}} placeholder="How many?"/>
                  </div>
                  <div className="field"><label>Price Per Unit ($)</label>
                    <input className="inp" type="number" step="0.01" min="0" value={form.pricePerUnit} onChange={function(e){sf("pricePerUnit",e.target.value);}} placeholder="0.00"/>
                  </div>
                </div>
                {estTotal && <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:7,padding:"9px 13px",fontSize:13,color:"#1d4ed8"}}>💰 Estimated total: <strong>${estTotal}</strong></div>}
                <div className="field"><label>Type</label>
                  <select className="inp" value={form.consumableOrDurable} onChange={function(e){sf("consumableOrDurable",e.target.value);}}>
                    <option value="Consumable">Consumable (used up)</option>
                    <option value="Durable">Durable (reused next year)</option>
                  </select>
                </div>
                <div className="field"><label>Phase — When do you need it?</label>
                  <select className="inp" value={form.phase} onChange={function(e){sf("phase",e.target.value);}}>
                    {PHASES.map(function(p){return <option key={p}>{p}</option>;})}
                  </select>
                </div>
                <div className="field"><label>Additional Details</label>
                  <textarea className="inp" rows={3} value={form.additionalDetails} onChange={function(e){sf("additionalDetails",e.target.value);}} placeholder="Color, size, why you need it…" style={{resize:"vertical"}}/>
                </div>
              </div>
              <div className="modal-ft">
                <button type="button" onClick={function(){setShowForm(false);}} className="btn btn-ghost">Cancel</button>
                <button type="submit" className={"btn " + (editingId?"btn-yellow":"btn-orange")}>{editingId?"Resubmit →":"Submit Request →"}</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

// ── TEACHER DASHBOARD ─────────────────────────────────────────────────────────
function TeacherDash(props) {
  var user=props.user, requests=props.requests, onSave=props.onSave;
  var _t=useState("pending"); var tab=_t[0]; var setTab=_t[1];
  var _s=useState(null); var sel=_s[0]; var setSel=_s[1];
  var _n=useState(""); var notes=_n[0]; var setNotes=_n[1];
  var _fs=useState(""); var filterS=_fs[0]; var setFilterS=_fs[1];
  var _fp=useState(""); var filterP=_fp[0]; var setFilterP=_fp[1];

  var pending   = useMemo(function(){return requests.filter(function(r){return r.teacherStatus==="Pending"&&!r.onHold;});}, [requests]);
  var onHold    = useMemo(function(){return requests.filter(function(r){return r.onHold;});}, [requests]);
  var readySend = useMemo(function(){return requests.filter(function(r){return r.teacherStatus==="Approved"&&!r.submittedForOrder;});}, [requests]);
  var submitted = useMemo(function(){return requests.filter(function(r){return r.submittedForOrder;});}, [requests]);
  var allF = useMemo(function(){
    var l = requests.slice().sort(function(a,b){return a.studentName.localeCompare(b.studentName);});
    if(filterS) l=l.filter(function(r){return r.studentName===filterS;});
    if(filterP) l=l.filter(function(r){return r.phase===filterP;});
    return l;
  }, [requests,filterS,filterP]);

  function setStatus(id,status) {
    var updated = requests.map(function(r){return r.id===id ? Object.assign({},r,{teacherStatus:status,teacherNotes:notes}) : r;});
    onSave(updated);
    setSel(null); setNotes("");
  }
  function toggleHold(id) {
    onSave(requests.map(function(r){return r.id===id ? Object.assign({},r,{onHold:!r.onHold}) : r;}));
  }
  function submitBatch(ids) {
    console.log("submitBatch called for ids:", ids.length);
    var updated = requests.map(function(r){return ids.indexOf(r.id)>=0 ? Object.assign({},r,{submittedForOrder:true,dateSubmitted:today()}) : r;});
    console.log("submittedForOrder check:", updated.filter(function(r){return r.submittedForOrder;}).length);
    onSave(updated);
  }

  var batchTotal = readySend.reduce(function(s,r){return s+(getTotal(r)||0);}, 0);

  function TRow(p) {
    var r=p.r;
    return (
      <tr>
        <td style={{fontWeight:600,fontSize:13}}>{r.studentName}</td>
        <td style={{maxWidth:180}}>
          <div style={{fontWeight:500,fontSize:13}}>{r.itemDescription}</div>
          {r.revisedAt&&<div style={{fontSize:10,color:"#0891b2",marginTop:2}}>↩ Revised {r.revisedAt}</div>}
        </td>
        <td style={{fontSize:12}}>{r.vendor}</td>
        <td>{r.link?<a href={r.link} target="_blank" rel="noreferrer">View ↗</a>:"—"}</td>
        <td style={{textAlign:"center"}}>{r.quantity}</td>
        <td>{fmtMoney(r.pricePerUnit)}</td>
        <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
        <td style={{fontSize:11,color:"#9ca3af"}}>{r.phase.split("—")[0].trim()}</td>
        {p.actions ? <td>{p.actions(r)}</td> : <td><StatusBadge r={r}/></td>}
      </tr>
    );
  }

  return (
    <div style={{maxWidth:1140,margin:"0 auto",padding:"22px 16px",display:"flex",flexDirection:"column",gap:18}} className="fu">
      <div>
        <h2 className="syne" style={{fontSize:20,fontWeight:800}}>Teacher Dashboard</h2>
        <p style={{color:"#6b7280",fontSize:12.5,marginTop:2}}>Review · Revise · Submit to JD</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10}}>
        {[{v:requests.length,l:"Total",c:"#111827"},{v:pending.length,l:"Pending",c:"#b45309"},
          {v:requests.filter(function(r){return r.teacherStatus==="Revision";}).length,l:"Needs Revision",c:"#d97706"},
          {v:readySend.length,l:"Ready to Submit",c:"#1d4ed8"},
          {v:submitted.filter(function(r){return !r.received;}).length,l:"In Progress",c:"#7c3aed"},
          {v:requests.filter(function(r){return r.received;}).length,l:"Received",c:"#16a34a"}].map(function(s){return (
          <div key={s.l} className="stat"><div className="stat-v" style={{color:s.c,fontSize:20}}>{s.v}</div><div className="stat-l">{s.l}</div></div>
        );})}
      </div>
      <div className="tabs">
        {[["pending","🔍 Pending ("+pending.length+")"],["readysend","📦 Submit to JD ("+readySend.length+")"],["all","📋 All"],["submitted","✅ Submitted ("+submitted.length+")"]].map(function(kl){return (
          <button key={kl[0]} className={"tab"+(tab===kl[0]?" on":"")} onClick={function(){setTab(kl[0]);}}>{kl[1]}</button>
        );})}
      </div>

      {tab==="pending" && (
        <div className="card">
          <div className="card-hd"><h3>Awaiting Your Review</h3>{onHold.length>0&&<span style={{fontSize:12,color:"#7c3aed"}}>+{onHold.length} on hold</span>}</div>
          {pending.length===0 ? <div className="empty"><div className="empty-icon">🎉</div><p>All caught up!</p></div> : (
            <div style={{overflowX:"auto"}}><table className="tbl">

              <tbody>{pending.map(function(r){return <TRow key={r.id} r={r} actions={function(r){return (
                <div style={{display:"flex",gap:5}}>
                  <button className="btn btn-green btn-sm" onClick={function(){setSel(Object.assign({},r,{action:"approve"}));setNotes("");}}>✓</button>
                  <button className="btn btn-yellow btn-sm" onClick={function(){setSel(Object.assign({},r,{action:"revise"}));setNotes("");}}>✏</button>
                  <button className="btn btn-red btn-sm" onClick={function(){setSel(Object.assign({},r,{action:"deny"}));setNotes("");}}>✗</button>
                  <button className="btn btn-ghost btn-sm" onClick={function(){toggleHold(r.id);}}>⏸</button>
                </div>
              );}}/>;})}
              </tbody>
            </table></div>
          )}
          {onHold.length>0 && (
            <div style={{borderTop:"1px solid #f3f4f6"}}>
              <div style={{padding:"10px 20px",fontSize:12,fontWeight:600,color:"#7c3aed",background:"#faf5ff"}}>⏸ On Hold ({onHold.length})</div>
              <div style={{overflowX:"auto"}}><table className="tbl"><tbody>
                {onHold.map(function(r){return <TRow key={r.id} r={r} actions={function(r){return (
                  <div style={{display:"flex",gap:5}}>
                    <button className="btn btn-green btn-sm" onClick={function(){setSel(Object.assign({},r,{action:"approve"}));setNotes("");}}>✓</button>
                    <button className="btn btn-ghost btn-sm" onClick={function(){toggleHold(r.id);}}>Remove Hold</button>
                  </div>
                );}}/>;})}
              </tbody></table></div>
            </div>
          )}
        </div>
      )}

      {tab==="readysend" && (
        <div className="card">
          <div className="card-hd">
            <h3>Approved — Ready to Submit to JD</h3>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {readySend.length>0 && <span style={{fontWeight:700,color:"#16a34a",fontSize:13}}>Batch: {fmtMoney(batchTotal)}</span>}
              <button className="btn btn-blue btn-sm" disabled={readySend.length===0} onClick={function(){submitBatch(readySend.map(function(r){return r.id;}));}}>Submit All {readySend.length} to JD →</button>
            </div>
          </div>
          {readySend.length===0 ? <div className="empty"><div className="empty-icon">📭</div><p>Nothing ready to submit.</p></div> : (
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Link</th><th>Qty</th><th>Unit $</th><th>Total</th><th>Phase</th><th>Action</th></tr></thead>
              <tbody>{readySend.map(function(r){return <TRow key={r.id} r={r} actions={function(r){return <button className="btn btn-blue btn-sm" onClick={function(){submitBatch([r.id]);}}>Submit →</button>;}}/>;})}
              </tbody>
              <tfoot><tr>
                <td colSpan={6} style={{textAlign:"right",fontWeight:700,background:"#f9fafb",padding:"10px 12px"}}>Total:</td>
                <td style={{fontWeight:700,background:"#f9fafb",padding:"10px 12px"}}>{fmtMoney(batchTotal)}</td>
                <td colSpan={2} style={{background:"#f9fafb"}}/>
              </tr></tfoot>
            </table></div>
          )}
        </div>
      )}

      {tab==="all" && (
        <div className="card">
          <div className="card-hd">
            <h3>All Requests</h3>
            <div style={{display:"flex",gap:8}}>
              <select className="inp" style={{fontSize:12,padding:"5px 26px 5px 9px",height:30,width:140}} value={filterS} onChange={function(e){setFilterS(e.target.value);}}>
                <option value="">All Students</option>{STUDENTS.map(function(s){return <option key={s}>{s}</option>;})}
              </select>
              <select className="inp" style={{fontSize:12,padding:"5px 26px 5px 9px",height:30,width:130}} value={filterP} onChange={function(e){setFilterP(e.target.value);}}>
                <option value="">All Phases</option>{PHASES.map(function(p){return <option key={p} value={p}>{p.split("—")[0].trim()}</option>;})}
              </select>
            </div>
          </div>
          {allF.length===0 ? <div className="empty"><p>No requests.</p></div> : (
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Link</th><th>Qty</th><th>Unit $</th><th>Total</th><th>Phase</th><th>Status</th></tr></thead>
              <tbody>{allF.map(function(r){return <TRow key={r.id} r={r} actions={null}/>;})}
              </tbody>
            </table></div>
          )}
        </div>
      )}

      {tab==="submitted" && (
        <div className="card">
          <div className="card-hd"><h3>Submitted to JD</h3></div>
          {submitted.length===0 ? <div className="empty"><p>Nothing submitted yet.</p></div> : (
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Total</th><th>Submitted</th><th>JD</th><th>Ordered</th><th>Received</th></tr></thead>
              <tbody>{submitted.map(function(r){return (
                <tr key={r.id}>
                  <td style={{fontWeight:600}}>{r.studentName}</td>
                  <td style={{fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12}}>{r.vendor}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td style={{fontSize:11}}>{r.dateSubmitted||"—"}</td>
                  <td>{r.jdApproval==="Approved"?<span className="badge b-appr">✓</span>:r.jdApproval==="Denied"?<span className="badge b-deny">✗</span>:<span className="badge b-pend">Pending</span>}</td>
                  <td>{r.jessicaOrdered?<span className="badge b-ordr">✓</span>:"—"}</td>
                  <td>{r.received?<span className="badge b-recv">✓</span>:"—"}</td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}

      {sel && (
        <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)setSel(null);}}>
          <div className="modal" style={{maxWidth:460}}>
            <div className="modal-hd">
              <h2>{sel.action==="approve"?"✅ Approve":sel.action==="revise"?"✏️ Request Revision":"❌ Deny"}</h2>
              <button onClick={function(){setSel(null);}} style={{background:"none",border:"none",fontSize:22,color:"#9ca3af",cursor:"pointer"}}>×</button>
            </div>
            <div className="modal-bd">
              <div style={{background:"#f9fafb",borderRadius:8,padding:"11px 14px"}}>
                <div style={{fontWeight:600}}>{sel.itemDescription}</div>

              </div>
              <div className="field">
                <label>{sel.action==="approve"?"Note (optional)":sel.action==="revise"?"What needs to change? (student sees this)":"Reason (student sees this)"}</label>
                <textarea className="inp" rows={3} value={notes} onChange={function(e){setNotes(e.target.value);}} style={{resize:"vertical"}} placeholder={sel.action==="revise"?"e.g. Please find on Amazon instead.":""}/>
              </div>
            </div>
            <div className="modal-ft">
              <button onClick={function(){setSel(null);}} className="btn btn-ghost">Cancel</button>
              {sel.action==="approve" && <button onClick={function(){setStatus(sel.id,"Approved");}} className="btn btn-green">Approve</button>}
              {sel.action==="revise" && <button onClick={function(){if(!notes.trim()){alert("Please add a note.");return;}setStatus(sel.id,"Revision");}} className="btn btn-yellow">Request Revision</button>}
              {sel.action==="deny" && <button onClick={function(){setStatus(sel.id,"Denied");}} className="btn btn-red">Deny</button>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── JD DASHBOARD ──────────────────────────────────────────────────────────────

          <div className="card-hd"><h3>History</h3></div>
          {history.length===0 ? <div className="empty"><p>No history yet.</p></div> : (
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Total</th><th>Status</th></tr></thead>
              <tbody>{history.map(function(r){return (
                <tr key={r.id}>
                  <td style={{fontWeight:600}}>{r.studentName}</td>
                  <td style={{fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12}}>{r.vendor}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td><StatusBadge r={r}/></td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}

      {sel && (
        <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)setSel(null);}}>
          <div className="modal" style={{maxWidth:460}}>
            <div className="modal-hd">
              <h2>{sel.action==="approve"?"✅ Approve":"❌ Deny"} — {sel.itemDescription}</h2>
              <button onClick={function(){setSel(null);}} style={{background:"none",border:"none",fontSize:22,color:"#9ca3af",cursor:"pointer"}}>×</button>
            </div>
            <div className="modal-bd">
              <div style={{background:"#f9fafb",borderRadius:8,padding:"11px 14px"}}>
                <div style={{fontWeight:600}}>{sel.itemDescription}</div>
                <div style={{color:"#6b7280",fontSize:12,marginTop:2}}>{sel.studentName} · {sel.vendor} · {fmtMoney(getTotal(sel))}</div>
                {sel.link&&<a href={sel.link} target="_blank" rel="noreferrer" style={{fontSize:12,color:"#1d4ed8",display:"block",marginTop:4}}>View ↗</a>}
              </div>
              <div className="field"><label>Notes (optional)</label>
                <textarea className="inp" rows={3} value={notes} onChange={function(e){setNotes(e.target.value);}} style={{resize:"vertical"}}/>
              </div>
            </div>
            <div className="modal-ft">
              <button onClick={function(){setSel(null);}} className="btn btn-ghost">Cancel</button>
              {sel.action==="approve"?<button onClick={function(){decide(sel.id,"Approved");}} className="btn btn-green">Approve</button>:<button onClick={function(){decide(sel.id,"Denied");}} className="btn btn-red">Deny</button>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── JESSICA DASHBOARD ─────────────────────────────────────────────────────────
function JessicaDash(props) {
  var requests=props.requests, onSave=props.onSave;
  var _t=useState("order"); var tab=_t[0]; var setTab=_t[1];

  var toOrder  = useMemo(function(){return requests.filter(function(r){return r.jdApproval==="Approved"&&!r.jessicaOrdered;});}, [requests]);
  var ordered  = useMemo(function(){return requests.filter(function(r){return r.jessicaOrdered&&!r.received;});}, [requests]);
  var received = useMemo(function(){return requests.filter(function(r){return r.received;});}, [requests]);

  function markOrdered(id){onSave(requests.map(function(r){return r.id===id?Object.assign({},r,{jessicaOrdered:true,dateOrdered:today()}):r;}));}
  function markReceived(id){onSave(requests.map(function(r){return r.id===id?Object.assign({},r,{received:true,dateReceived:today()}):r;}));}
  function markAllOrdered(){var ids=toOrder.map(function(r){return r.id;});onSave(requests.map(function(r){return ids.indexOf(r.id)>=0?Object.assign({},r,{jessicaOrdered:true,dateOrdered:today()}):r;}));}

  var orderTotal = toOrder.reduce(function(s,r){return s+(getTotal(r)||0);}, 0);

  return (
    <div style={{maxWidth:1100,margin:"0 auto",padding:"22px 16px",display:"flex",flexDirection:"column",gap:18}} className="fu">
      <div>
        <h2 className="syne" style={{fontSize:20,fontWeight:800}}>Purchasing — Jessica Coons</h2>
        <p style={{color:"#6b7280",fontSize:12.5,marginTop:2}}>JD-approved items ready to order</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
        {[{v:toOrder.length,l:"Ready to Order",c:"#f04e1f"},{v:fmtMoney(orderTotal),l:"Order Value",c:"#f04e1f"},
          {v:ordered.length,l:"In Transit",c:"#1d4ed8"},{v:received.length,l:"Received",c:"#16a34a"}].map(function(s){return (
          <div key={s.l} className="stat"><div className="stat-v" style={{color:s.c,fontSize:20}}>{s.v}</div><div className="stat-l">{s.l}</div></div>
        );})}
      </div>
      <div className="tabs">
        {[["order","🛒 To Order ("+toOrder.length+")"],["ordered","📦 Ordered ("+ordered.length+")"],["received","✅ Received ("+received.length+")"]].map(function(kl){return (
          <button key={kl[0]} className={"tab"+(tab===kl[0]?" on":"")} onClick={function(){setTab(kl[0]);}}>{kl[1]}</button>
        );})}
      </div>
      {tab==="order" && (
        <div className="card">
          <div className="card-hd">
            <h3>Ready to Order</h3>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              {toOrder.length>0&&<span style={{fontWeight:700,color:"#16a34a",fontSize:13}}>Total: {fmtMoney(orderTotal)}</span>}
              <button className="btn btn-orange btn-sm" disabled={toOrder.length===0} onClick={markAllOrdered}>Mark All Ordered</button>
            </div>
          </div>
          {toOrder.length===0 ? <div className="empty"><div className="empty-icon">✅</div><p>Nothing to order!</p></div> : (
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Link</th><th>Qty</th><th>Unit $</th><th>Total</th><th>Action</th></tr></thead>
              <tbody>{toOrder.map(function(r){return (
                <tr key={r.id}>
                  <td style={{fontWeight:600}}>{r.studentName}</td>
                  <td style={{maxWidth:180,fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12}}>{r.vendor}</td>
                  <td>{r.link?<a href={r.link} target="_blank" rel="noreferrer">View ↗</a>:"—"}</td>
                  <td style={{textAlign:"center"}}>{r.quantity}</td>
                  <td>{fmtMoney(r.pricePerUnit)}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td><button className="btn btn-orange btn-sm" onClick={function(){markOrdered(r.id);}}>Mark Ordered</button></td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}
      {tab==="ordered" && (
        <div className="card">
          <div className="card-hd"><h3>In Transit</h3></div>
          {ordered.length===0 ? <div className="empty"><p>Nothing in transit.</p></div> : (
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Total</th><th>Date Ordered</th><th>Action</th></tr></thead>
              <tbody>{ordered.map(function(r){return (
                <tr key={r.id}>
                  <td style={{fontWeight:600}}>{r.studentName}</td>
                  <td style={{fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12}}>{r.vendor}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td style={{fontSize:12}}>{r.dateOrdered||"—"}</td>
                  <td><button className="btn btn-green btn-sm" onClick={function(){markReceived(r.id);}}>✓ Received</button></td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}
      {tab==="received" && (
        <div className="card">
          <div className="card-hd"><h3>Received</h3></div>
          {received.length===0 ? <div className="empty"><p>Nothing received yet.</p></div> : (
            <div style={{overflowX:"auto"}}><table className="tbl">
              <thead><tr><th>Student</th><th>Item</th><th>Vendor</th><th>Total</th><th>Ordered</th><th>Received</th></tr></thead>
              <tbody>{received.map(function(r){return (
                <tr key={r.id}>
                  <td style={{fontWeight:600}}>{r.studentName}</td>
                  <td style={{fontWeight:500,fontSize:13}}>{r.itemDescription}</td>
                  <td style={{fontSize:12}}>{r.vendor}</td>
                  <td style={{fontWeight:600}}>{fmtMoney(getTotal(r))}</td>
                  <td style={{fontSize:11}}>{r.dateOrdered||"—"}</td>
                  <td style={{fontSize:11}}>{r.dateReceived||"—"}</td>
                </tr>
              );})}</tbody>
            </table></div>
          )}
        </div>
      )}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  var _u=useState(null); var user=_u[0]; var setUser=_u[1];
  var _r=useState(null); var requests=_r[0]; var setRequests=_r[1];
  var _ls=useState(null); var lastSync=_ls[0]; var setLastSync=_ls[1];

  function refresh() {
    dbLoad(function(data) {
      setRequests(data);
      setLastSync(new Date().toLocaleTimeString());
    });
  }

  useEffect(function() {
    refresh();
    var t = setInterval(refresh, 30000);
    return function(){ clearInterval(t); };
  }, []);

  function handleSave(updated) {
    setRequests(updated);
    dbSave(updated, null);
  }

  if (requests === null) return (
    <div style={{minHeight:"100vh",background:"#0f1117",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <GlobalStyles/>
      <div style={{textAlign:"center"}}>
        <div style={{width:36,height:36,border:"3px solid #1f2937",borderTopColor:"#f04e1f",borderRadius:"50%",margin:"0 auto 12px",animation:"spin .7s linear infinite"}}/>
        <p style={{color:"#6b7280",fontSize:12}}>Loading…</p>
      </div>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    </div>
  );

  if (!user) return <><GlobalStyles/><Login onLogin={setUser}/></>;

  return (
    <>
      <GlobalStyles/>
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <Topbar user={user} onLogout={function(){setUser(null);}} onRefresh={refresh} lastSync={lastSync}/>
        <main style={{flex:1}}>
          {user.role==="student"  && <StudentPortal user={user} requests={requests} onSave={handleSave}/>}
          {user.role==="teacher"  && <TeacherDash   user={user} requests={requests} onSave={handleSave}/>}
          {user.role==="jd"       && <JDDash        user={user} requests={requests} onSave={handleSave}/>}
          {user.role==="jessica"  && <JessicaDash   user={user} requests={requests} onSave={handleSave}/>}
        </main>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
